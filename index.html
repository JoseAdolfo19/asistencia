<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Asistencia</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jsPDF y autoTable para exportar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-gradient-primary shadow-lg">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center">
                <i class="fas fa-clipboard-check me-3 fs-5"></i>
                <span>Sistema de Control de Asistencia</span>
            </span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid py-5">
        <div class="row">
            <!-- Formulario de Agregar Alumno -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-lg border-0 h-100">
                    <div class="card-header bg-gradient-primary text-white py-3">
                        <h5 class="mb-0"><i class="fas fa-user-plus me-2"></i>Agregar Alumno</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="nombreAlumno" class="form-label fw-bold">Nombre del Alumno</label>
                            <input type="text" class="form-control form-control-lg border-2" 
                                   id="nombreAlumno" placeholder="Ej: Juan Pérez" />
                        </div>
                        <button class="btn btn-primary btn-lg w-100" onclick="agregarAlumno()">
                            <i class="fas fa-plus me-2"></i>Agregar Alumno
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabla de Asistencia -->
            <div class="col-lg-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-gradient-success text-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-list-check me-2"></i>Lista de Alumnos - <span id="fechaActual" class="badge bg-light text-dark"></span></h5>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="checkAsistio" onclick="marcarTodos(this)" />
                            <label class="form-check-label text-white" for="checkAsistio">Marcar Todos</label>
                        </div>
                    </div>
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover mb-0" id="tablaAlumnos">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width: 5%">#</th>
                                    <th>Apellidos y Nombres</th>
                                    <th class="text-center" style="width: 30%">Asistencia</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Las filas se generarán dinámicamente -->
                            </tbody>
                        </table>
                        <div id="tablaPrimero" class="alert alert-info text-center m-3 mb-0">
                            <i class="fas fa-info-circle me-2"></i>Agrega alumnos para comenzar...
                        </div>
                    </div>
                    <div class="card-footer bg-light py-3 d-flex gap-2">
                        <button class="btn btn-success btn-lg" onclick="guardarAsistencia()">
                            <i class="fas fa-save me-2"></i>Guardar Asistencia
                        </button>
                        <button class="btn btn-danger btn-lg" onclick="exportarPDF()">
                            <i class="fas fa-file-pdf me-2"></i>Exportar PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div class="row mt-5" id="resultadoContainer" style="display:none;">
            <div class="col-12">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-gradient-info text-white py-3">
                        <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>Resultados de Asistencia</h5>
                    </div>
                    <div class="card-body">
                        <div id="resultado" class="table-responsive"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
